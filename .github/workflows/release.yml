name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=$TAG" -o discord-rpc-bridge main.go

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" discord-rpc-bridge --title "$TAG" --generate-notes
